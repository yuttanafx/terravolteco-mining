<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terravolteco | Quantum Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffae; --bg: #02050d; --card: #0a1220cc; }
        
        /* ปรับให้เหมือนแอปมือถือ */
        body { 
            background: var(--bg); color: white; font-family: 'Prompt', sans-serif;
            margin: 0; padding: 15px; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 500px; margin: auto; }

        /* ปรับ Layout ให้ Responsive */
        .hero-grid { grid-template-columns: 1fr; text-align: center; }
        .dashboard { grid-template-columns: 1fr; }
        
        .card { padding: 20px; border-radius: 20px; margin-bottom: 15px; }

        /* ปรับ Map ให้พอดีมือถือ */
        .grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .rack { height: 60px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; }

        /* ปรับขนาดตัวอักษรสำหรับมือถือ */
        h1 { font-size: 24px; }
        h2 { font-size: 20px; }
        
        /* ป้องกันการซูมแบบไม่ตั้งใจ */
        input, select, textarea, button { font-size: 16px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <div class="logo-wrap">
            <div class="logo" style="width:50px; height:50px; font-size:24px;">⚡</div>
            <div class="logo-text"><h1>Terra<span>volteco</span></h1></div>
        </div>
    </div>

    <section class="dashboard">
        <div class="card">
            <div class="card-title"><h3>Member Portal</h3></div>
            <div id="display"></div>
            <div class="grid" id="map"></div>
        </div>
    </section>

    </div>

<script>
    // โลจิกเดิมของคุณ...
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const userData = {
        "A12": { name: "คุณสมชาย", rack: "Section B - Rack A12", status: "ชำระแล้ว", position: 12, hashrate: "142 TH/s", temperature: "58°C", uptime: "99.8%" },
        "B05": { name: "คุณสมหญิง", rack: "Section A - Rack B05", status: "ค้างชำระ", position: 5, hashrate: "126 TH/s", temperature: "64°C", uptime: "94.1%" }
    };

    const display = document.getElementById('display');
    const map = document.getElementById('map');

    if(userId && userData[userId]){
        const user = userData[userId];
        display.innerHTML = `
            <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:15px;">
                <p>สมาชิก: <strong>${user.name}</strong></p>
                <p>ตำแหน่ง: <strong>${user.rack}</strong></p>
                <p>Hashrate: <strong>${user.hashrate}</strong></p>
                <div class="status ${user.status === 'ชำระแล้ว' ? 'paid' : 'pending'}">
                    ${user.status === 'ชำระแล้ว' ? '🟢 ACTIVE' : '🟠 PAYMENT PENDING'}
                </div>
            </div>
        `;
        
        for(let i=0; i<24; i++){ // ปรับให้เหลือ 24 ช่องสำหรับจอมือถือ
            const rack = document.createElement('div');
            rack.className = 'rack ' + (i === user.position ? 'active' : '');
            map.appendChild(rack);
        }
    } else {
        display.innerHTML = `<div style="color:red; text-align:center;">กรุณาเข้าสู่ระบบผ่านลิงก์เฉพาะบุคคล</div>`;
    }
</script>
</body>
</html>
