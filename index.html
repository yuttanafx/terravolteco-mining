<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Terravolteco | Mining Management</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        h1, h2 { color: var(--neon); text-transform: uppercase; }
        .btn { background: var(--neon); color: black; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .rack { height: 40px; background: #222; border: 1px solid #444; }
        .rack.active { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .status { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>Terravolteco Facility</h1>
    
    <!-- ส่วนแจ้งความประสงค์ -->
    <div class="card">
        <h2>อยากวางเครื่องขุดกับเรา?</h2>
        <p>ยกระดับการขุดด้วยพลังงานสะอาด 100% จากเทคโนโลยี Flywheel ของเรา</p>
        <a href="https://line.me/ti/p/YourLineLink" class="btn">สมัครใช้บริการผ่าน Line</a>
    </div>

    <!-- ส่วน Dashboard -->
    <!-- ในไฟล์ index.html ให้หา <div class="card"> ที่แสดงสถานะเครื่องขุดเดิม แล้วแทนที่ด้วยบล็อกนี้ครับ -->

<div class="card" id="member-portal">
    <h2>สถานะสมาชิกของคุณ</h2>
    <div id="display">
        <!-- ข้อมูลจะถูกดึงมาโชว์ตรงนี้โดยอัตโนมัติ -->
    </div>
</div>

<script>
    // 1. ดึงค่า ID จากลิงก์ (เช่น .../?id=A12)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    // 2. ฐานข้อมูลลูกค้า (คุณมาเพิ่มชื่อลูกค้าที่นี่)
    const userData = {
        "A12": { name: "คุณสมชาย", rack: "Section B - Rack A12", status: "ชำระแล้ว" },
        "B05": { name: "คุณสมหญิง", rack: "Section A - Rack B05", status: "ค้างชำระ" }
    };

    // 3. แสดงผล
    const display = document.getElementById('display');
    if (userId && userData[userId]) {
        const user = userData[userId];
        display.innerHTML = `
            <p>สมาชิก: <strong>${user.name}</strong></p>
            <p>ตำแหน่ง: <strong>${user.rack}</strong></p>
            <p>สถานะ: <strong style="color:${user.status === 'ชำระแล้ว' ? 'var(--neon)' : 'orange'}">${user.status}</strong></p>
        `;
    } else {
        display.innerHTML = `<p style="color:red;">กรุณาเข้าสู่ระบบผ่านลิงก์เฉพาะบุคคลของคุณ</p>`;
    }
</script>

    <!-- ส่วนชำระเงิน -->
    <div class="card">
        <h2>ชำระเงินรายเดือน</h2>
        <p>สถานะ: <strong style="color:orange">รอการชำระเงิน (Due: 15 มิ.ย. 66)</strong></p>
        <button class="btn" onclick="alert('แสดง QR Code สำหรับชำระเงิน')">ชำระเงิน </button>
    </div>
</div>

<script>
    const map = document.getElementById('map');
    for(let i=0; i<36; i++) {
        let rack = document.createElement('div');
        rack.className = 'rack ' + (i === 12 ? 'active' : ''); // สมมติว่าเครื่องลูกค้าอยู่ที่ช่อง 12
        map.appendChild(rack);
    }
</script>
</body>
</html>
