<!DOCTYPE html>
<html>
<head>
    <title>Terravolteco Mining</title> 
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .mining-grid { display: grid; grid-template-columns: repeat(8, 50px); gap: 10px; }
        .rack { width: 50px; height: 50px; background: #111; border: 1px solid #333; }
        .rack.active { background: #004422; box-shadow: inset 0 0 10px #00ff88; border: 1px solid #00ff88; }
    </style>
</head>
<body>
    <h1>Terravolteco Facility</h1>
    <div class="mining-grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for(let i=0; i<48; i++) {
            let div = document.createElement('div');
            div.className = 'rack ' + (Math.random() > 0.5 ? 'active' : '');
            grid.appendChild(div);
        }
    </script>
</body>
</html>
